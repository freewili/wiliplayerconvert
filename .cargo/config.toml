# Local build environment for the static-FFmpeg link (see build/README.md).
# These paths are machine-specific; CI sets its own equivalents.

# The repo lives under Dropbox; sync locks files in target/ mid-compile
# (os error 32). Build outside the synced tree to avoid the race.
[build]
target-dir = "C:/Users/dave/fc-target"

[env]
# bindgen (used by ffmpeg-sys) needs libclang.dll.
LIBCLANG_PATH = "C:\\Program Files\\LLVM\\bin"
# ffmpeg-sys discovers the static FFmpeg libs through vcpkg.
VCPKG_ROOT = "C:\\Users\\dave\\vcpkg"
# Force bindgen's libclang into MSVC mode so it uses the MSVC/Windows SDK
# headers (from vcvars' INCLUDE) instead of auto-detecting MSYS2/MinGW headers.
BINDGEN_EXTRA_CLANG_ARGS = "--target=x86_64-pc-windows-msvc"
# ffmpeg-sys locates the libs via pkg-config. Use a standalone pkgconf (NOT the
# MinGW one on PATH, which would re-trigger clang's MinGW-header detection) and
# the vcpkg .pc files. ALL_STATIC pulls the full transitive lib set.
PKG_CONFIG = "C:\\Users\\dave\\vcpkg\\pkgconf.exe"
PKG_CONFIG_PATH = "C:\\Users\\dave\\vcpkg\\installed\\x64-windows-static-md\\lib\\pkgconfig"
PKG_CONFIG_ALL_STATIC = "1"
